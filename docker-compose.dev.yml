version: '3.8'

networks:
  fittech-network:
    driver: bridge

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fittech-network

  auth-db:
    image: mysql:8
    container_name: auth-db
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - fittech-network

  user-db:
    image: mysql:8
    container_name: user-db
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    networks:
      - fittech-network

  subscription-db:
    image: mysql:8
    container_name: subscription-db
    environment:
      MYSQL_DATABASE: subscription_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    networks:
      - fittech-network

  booking-db:
    image: mysql:8
    container_name: booking-db
    environment:
      MYSQL_DATABASE: booking_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3310:3306"
    networks:
      - fittech-network

  activity-db:
    image: mysql:8
    container_name: activity-db
    environment:
      MYSQL_DATABASE: activity_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3311:3306"
    networks:
      - fittech-network